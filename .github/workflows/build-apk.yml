name: Build Sana AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Create Android folder if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      # ✅ Kotlin संस्करण अपडेट करें (यह नया स्टेप है)
      - name: Update Kotlin version
        run: |
          # settings.gradle में Kotlin प्लगइन वर्शन बदलें
          sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "1.9.0"/' android/settings.gradle
          # यदि settings.gradle में न हो तो build.gradle में ext.kotlin_version सेट करें
          if ! grep -q "ext.kotlin_version" android/build.gradle; then
            sed -i "/buildscript {/a \    ext.kotlin_version = '1.9.0'" android/build.gradle
          else
            sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.0'/" android/build.gradle
          fi

      - name: Remove CMake configuration from build.gradle
        run: |
          sed -i '/externalNativeBuild/d' android/app/build.gradle
          sed -i '/cmake/d' android/app/build.gradle

      - name: Update compileSdk to 36
        run: sed -i 's/compileSdk = .*/compileSdk = 36/' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk