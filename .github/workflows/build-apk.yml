name: Build Sana AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Create Android folder if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Remove CMake configuration from build.gradle
        run: |
          sed -i '/externalNativeBuild/d' android/app/build.gradle
          sed -i '/cmake/d' android/app/build.gradle

      - name: Update compileSdk to 36
        run: sed -i 's/compileSdk = .*/compileSdk = 36/' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk